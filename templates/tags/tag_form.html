{% extends "base.html" %}

{% block title %}{{ form_title }}{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-6 max-w-md">
    <h1 class="text-2xl font-bold text-white mb-6">{{ form_title }}</h1>

    <div class="card p-6">
        <form method="post" novalidate>
            {% csrf_token %}

            <div class="mb-4">
                <label for="id_name" class="block text-sm font-medium text-gray-300 mb-1">
                    {{ form.name.label }}
                </label>
                {{ form.name }}
                {% if form.name.errors %}
                <p class="mt-1 text-sm text-red-400">{{ form.name.errors.0 }}</p>
                {% endif %}
            </div>

            <div class="flex gap-3">
                <button type="submit" class="btn-primary flex-1">{{ form_action }}</button>
                <a href="{% url 'tags:list' %}" class="btn-secondary flex-1 text-center">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
