{% extends "base.html" %}

{% block title %}Excluir Tag{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-6 max-w-md">
    <h1 class="text-2xl font-bold text-white mb-6">Excluir Tag</h1>

    <div class="card p-6">
        <p class="text-gray-300 mb-4">
            Tem certeza que deseja excluir a tag
            <span class="font-semibold text-white">"{{ object.name }}"</span>?
        </p>
        <p class="text-sm text-gray-400 mb-6">
            A tag será removida de todas as transações associadas.
        </p>

        <form method="post">
            {% csrf_token %}
            <div class="flex gap-3">
                <button type="submit" class="btn-danger flex-1">Excluir</button>
                <a href="{% url 'tags:list' %}" class="btn-secondary flex-1 text-center">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
