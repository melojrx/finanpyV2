<div class="relative" data-tag-filter-root>
    <label id="{{ widget_id }}-label" for="{{ widget_id }}-trigger"
           class="block text-xs font-medium text-gray-400 mb-1.5">
        Tags
    </label>

    <button type="button" id="{{ widget_id }}-trigger"
            class="w-full min-h-[52px] px-4 rounded-xl border-2 border-gray-700 bg-gray-800
                   text-left text-gray-100 flex items-center justify-between gap-3 cursor-pointer
                   hover:border-gray-600 focus:outline-none focus:border-sky-500
                   focus:ring-4 focus:ring-sky-500/20 transition-colors"
            data-tag-filter-trigger aria-expanded="false"
            aria-controls="{{ widget_id }}-panel"
            aria-labelledby="{{ widget_id }}-label {{ widget_id }}-summary">
        <span id="{{ widget_id }}-summary" class="truncate" data-tag-filter-summary>
            {% if field.value %}{{ field.value|length }} tags selecionadas{% else %}Todas as tags{% endif %}
        </span>
        <svg class="w-4 h-4 shrink-0 text-gray-400 transition-transform duration-200"
             data-tag-filter-chevron fill="none" stroke="currentColor"
             viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round"
                  stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
    </button>

    <div id="{{ widget_id }}-panel" hidden data-tag-filter-panel
         class="{% if inline_panel %}relative mt-2{% else %}absolute top-full left-0 right-0 mt-2{% endif %}
                z-50 overflow-hidden rounded-xl border border-gray-600
                bg-gray-900 shadow-2xl shadow-black/30"
         aria-labelledby="{{ widget_id }}-label">
        <fieldset class="max-h-56 overflow-y-auto py-1">
            <legend class="sr-only">Selecione uma ou mais tags</legend>
            {% for tag in field.field.queryset %}
                {% with tag_id=tag.pk|stringformat:"s" %}
                    <label class="flex items-center gap-3 px-3 py-2.5 min-h-[44px]
                                  cursor-pointer text-sm text-gray-200
                                  hover:bg-gray-800 transition-colors">
                        <input type="checkbox" name="tags" value="{{ tag.pk }}"{% if field.value and tag_id in field.value %} checked{% endif %}
                               class="w-4 h-4 rounded border-gray-600 bg-gray-800
                                      text-sky-500 accent-sky-500
                                      focus:ring-2 focus:ring-sky-500/40"
                               data-tag-filter-option data-tag-name="{{ tag.name }}">
                        <span class="min-w-0 flex-1 truncate">{{ tag.name }}</span>
                    </label>
                {% endwith %}
            {% empty %}
                <p class="px-3 py-4 text-sm text-gray-500">Nenhuma tag cadastrada.</p>
            {% endfor %}
        </fieldset>
    </div>
</div>
