name: Deploy MCP FinanPy to VPS

on:
  push:
    branches: [main]
    paths: ['mcp/**', '.github/workflows/mcp-deploy.yml']

jobs:
  deploy-mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_DEPLOY_KEY }}
          port: 22
          command_timeout: 8m
          script: |
            set -e

            # Create directory
            mkdir -p /opt/finanpy-mcp

            # Copy files via tar (avoid rsync path issues)
            cd /home/runner/work/finanpyV2/finanpyV2
            tar czf - mcp/ | ssh root@38.52.128.62 "cd /opt/finanpy-mcp && rm -rf * && tar xzf -"

            # Recreate venv
            cd /opt/finanpy-mcp
            rm -rf .venv
            python3.12 -m venv .venv
            .venv/bin/pip install -r requirements.txt

            # Restart Hermes
            systemctl restart hermes-gateway

            # Verify
            systemctl status hermes-gateway --no-pager